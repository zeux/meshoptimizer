<!doctype html>
<html lang="en">
	<head>
		<title>meshoptimizer - demo</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
		<style>
			body {
				font-family: Monospace;
				background-color: #300a24;
				color: #fff;
				margin: 0px;
				overflow: hidden;
				display: flex;
				flex-direction: column;
				height: 100vh;
			}
			#container {
				width: 100%;
				flex: 1;
				position: relative;
			}
			.renderer-container {
				position: relative;
				width: 100%;
				height: 100%;
			}
			.renderer-container canvas {
				width: 100% !important;
				height: 100% !important;
				display: block;
				user-select: none;
			}
			.renderer-label {
				position: absolute;
				top: 10px;
				left: 10px;
				background-color: rgba(0, 0, 0, 0.5);
				padding: 5px 10px;
				border-radius: 5px;
				pointer-events: none;
				font-size: 14px;
			}
			.stats-label {
				position: absolute;
				top: 45px;
				left: 10px;
				background-color: rgba(0, 0, 0, 0.5);
				padding: 5px 10px;
				border-radius: 5px;
				pointer-events: none;
				font-size: 12px;
				line-height: 1.4;
			}
		</style>

		<script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
					"three-examples/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/",
					"three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.10/build/index.module.js",
					"watlas": "https://cdn.jsdelivr.net/npm/watlas@1.0.1/dist/watlas.js",
					"lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.20.0/dist/lil-gui.esm.js"
				}
			}
		</script>
	</head>

	<body>
		<div id="container"></div>
		<input type="file" id="fileInput" style="display: none" accept=".obj,.glb" />

		<script type="module">
			import * as THREE from 'three';
			import { GLTFLoader } from 'three-examples/loaders/GLTFLoader.js';
			import { OBJLoader } from 'three-examples/loaders/OBJLoader.js';
			import { OrbitControls } from 'three-examples/controls/OrbitControls.js';
			import { mergeGeometries, mergeVertices } from 'three-examples/utils/BufferGeometryUtils.js';
			import { MeshBVH } from 'three-mesh-bvh';
			import { MeshoptDecoder } from '../js/meshopt_decoder.mjs';
			import { MeshoptSimplifier } from '../js/meshopt_simplifier.js';
			import { Initialize as initializeWatlas, Atlas } from 'watlas';
			import { GUI } from 'lil-gui';

			var container;
			var camera, renderer, scene, controls, model, merged, remeshed, remeshMaterial, stats;
			var textureImages = new WeakMap();

			var settings = {
				wireframe: false,
				resolution: 96,
				simplify: {
					enabled: false,
					regularize: false,
					errorThresholdLog10: 3,
				},
				paint: {
					mode: 'vertex',
					resolution: 1024,
					gutter: 1,
				},

				loadFile: function () {
					var input = document.getElementById('fileInput');
					input.onchange = function () {
						var file = input.files[0];
						var uri = URL.createObjectURL(file);
						var ext = file.name.split('.').pop().toLowerCase();

						container.querySelector('.renderer-label').textContent = file.name;
						load(uri, ext);
					};
					input.click();
				},

				remesh: function () {
					remesh();
				},

				revert: function () {
					revert();
				},

				updateModule: function () {
					reload();
					remesh();
				},
				autoUpdate: false,
				autoUpdateStatus: '',
			};

			var gui = new GUI({ width: 300 });
			var guiDisplay = gui.addFolder('Display');
			guiDisplay.add(settings, 'wireframe').onChange(update);

			var guiRemesh = gui.addFolder('Remesh');
			guiRemesh.add(settings, 'resolution', 1, 256, 1);
			guiRemesh.add(settings, 'remesh');
			guiRemesh.add(settings, 'revert');

			var guiSimplify = gui.addFolder('Simplify');
			guiSimplify.add(settings.simplify, 'enabled');
			guiSimplify.add(settings.simplify, 'regularize');
			guiSimplify.add(settings.simplify, 'errorThresholdLog10', 0, 3, 0.1);

			var guiPaint = gui.addFolder('Paint');
			guiPaint.add(settings.paint, 'mode', ['none', 'vertex', 'texture']);
			guiPaint.add(settings.paint, 'resolution', [256, 512, 1024, 2048]);
			guiPaint.add(settings.paint, 'gutter', 0, 8, 1);

			var guiLoad = gui.addFolder('Load');
			guiLoad.add(settings, 'loadFile');
			guiLoad.add(settings, 'updateModule');
			guiLoad.add(settings, 'autoUpdate').onChange(autoReload);
			guiLoad.add(settings, 'autoUpdateStatus').listen();

			init();
			loadDefault();
			render();

			function createView(name) {
				// Create renderer container
				var rendererContainer = document.createElement('div');
				rendererContainer.className = 'renderer-container';
				container.appendChild(rendererContainer);

				// Add label with file name
				var label = document.createElement('div');
				label.className = 'renderer-label';
				label.textContent = name;
				rendererContainer.appendChild(label);

				// Add stats label
				var statsLabel = document.createElement('div');
				statsLabel.className = 'stats-label';
				rendererContainer.appendChild(statsLabel);

				// Initialize stats
				stats = {
					triangles: 0,
					vertices: 0,
					ratio: 0,
					label: statsLabel,
				};

				// Create renderer
				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio(window.devicePixelRatio);
				rendererContainer.appendChild(renderer.domElement);

				// Create scene
				scene = new THREE.Scene();
				scene.background = new THREE.Color(0x300a24);

				// Add lighting
				var ambientLight = new THREE.AmbientLight(0xcccccc, 1);
				scene.add(ambientLight);

				var pointLightR = new THREE.PointLight(0xffffff, 4);
				pointLightR.position.set(3, 3, 0);
				pointLightR.decay = 0.5;
				scene.add(pointLightR);

				var pointLightL = new THREE.PointLight(0xffffff, 1);
				pointLightL.position.set(-3, 5, 0);
				pointLightL.decay = 0.5;
				scene.add(pointLightL);

				remeshMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd });

				// Create controls
				controls = new OrbitControls(camera, renderer.domElement);

				// Adjust renderer size
				updateRendererSizes();
			}

			function mergeMesh(model) {
				var geometries = [];
				var vertex = new THREE.Vector3();
				var sourceTriangle = [];
				var sourceMesh = [];

				model.updateMatrixWorld(true);
				model.traverse(function (object) {
					if (object.isMesh && object.geometry.attributes.position) {
						var source = object.geometry.attributes.position;
						var positions = new Float32Array(source.count * 3);

						// getVertexPosition applies the skinning transform, if present
						for (var i = 0; i < source.count; ++i) {
							object.getVertexPosition(i, vertex);
							vertex.toArray(positions, i * 3);
						}

						var geometry = new THREE.BufferGeometry();
						geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
						if (object.geometry.index) {
							geometry.setIndex(object.geometry.index);
						} else {
							var indices = new Uint32Array(source.count);
							for (var i = 0; i < source.count; ++i) indices[i] = i;
							geometry.setIndex(new THREE.BufferAttribute(indices, 1));
						}
						geometry.applyMatrix4(object.matrixWorld);
						geometries.push(geometry);

						for (var i = 0; i < geometry.index.count / 3; ++i) {
							sourceTriangle.push(i);
							sourceMesh.push(object);
						}
					}
				});

				var result = mergeGeometries(geometries);
				result.sourceTriangle = sourceTriangle;
				result.sourceMesh = sourceMesh;
				result.bvh = new MeshBVH(result, { indirect: true });
				return result;
			}

			function getTextureImage(texture) {
				if (!textureImages.has(texture.source)) {
					var canvas = document.createElement('canvas');
					canvas.width = texture.image.width;
					canvas.height = texture.image.height;
					var context = canvas.getContext('2d');
					context.drawImage(texture.image, 0, 0);
					textureImages.set(texture.source, context.getImageData(0, 0, texture.image.width, texture.image.height));
				}
				return textureImages.get(texture.source);
			}

			function sampleTexture(texture, uv) {
				var image = getTextureImage(texture);
				var point = texture.transformUv(uv);
				var x = Math.min(Math.floor(point.x * image.width), image.width - 1);
				var y = Math.min(Math.floor(point.y * image.height), image.height - 1);
				var offset = (y * image.width + x) * 4;
				return new THREE.Color(image.data[offset] / 255, image.data[offset + 1] / 255, image.data[offset + 2] / 255);
			}

			function interpolate(attribute, a, b, c, bary, component) {
				return attribute.getComponent(a, component) * bary.x + attribute.getComponent(b, component) * bary.y + attribute.getComponent(c, component) * bary.z;
			}

			function sampleColorBary(mesh, triangle, bary) {
				var geometry = mesh.geometry;
				var a = geometry.index.array[triangle * 3 + 0], b = geometry.index.array[triangle * 3 + 1], c = geometry.index.array[triangle * 3 + 2];

				var material = mesh.material;
				if (Array.isArray(material)) {
					var group = geometry.groups.find(function (group) { return offset >= group.start && offset < group.start + group.count; });
					material = material[group.materialIndex];
				}

				var result = material.color.clone();

				var uv = new THREE.Vector2();
				if (geometry.attributes.uv) {
					uv.x = interpolate(geometry.attributes.uv, a, b, c, bary, 0);
					uv.y = interpolate(geometry.attributes.uv, a, b, c, bary, 1);
				}

				if (material.map) {
					result.multiply(sampleTexture(material.map, uv).convertSRGBToLinear());
				}

				if (material.vertexColors) {
					result.r *= interpolate(geometry.attributes.color, a, b, c, bary, 0);
					result.g *= interpolate(geometry.attributes.color, a, b, c, bary, 1);
					result.b *= interpolate(geometry.attributes.color, a, b, c, bary, 2);
				}

				if (material.aoMap) {
					var ao = sampleTexture(material.aoMap, uv).r;
					result.multiplyScalar(1 + material.aoMapIntensity * (ao - 1));
				}

				if (material.metalnessMap) {
					var metalness = sampleTexture(material.metalnessMap, uv).b;
					result.multiplyScalar(1 - material.metalness * metalness);
				}

				return result;
			}

			function sampleColor(model, point) {
				var hit = model.bvh.closestPointToPoint(point);
				var a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3(), bary = new THREE.Vector3();
				a.fromBufferAttribute(model.attributes.position, model.index.array[hit.faceIndex * 3 + 0]);
				b.fromBufferAttribute(model.attributes.position, model.index.array[hit.faceIndex * 3 + 1]);
				c.fromBufferAttribute(model.attributes.position, model.index.array[hit.faceIndex * 3 + 2]);
				THREE.Triangle.getBarycoord(hit.point, a, b, c, bary);
				return sampleColorBary(model.sourceMesh[hit.faceIndex], model.sourceTriangle[hit.faceIndex], bary);
			}

			function transferColors(model, geometry) {
				var colors = new Float32Array(geometry.attributes.position.count * 4);
				var query = new THREE.Vector3(), temp = new THREE.Vector3();

				for (var i = 0; i < geometry.attributes.position.count; ++i) {
					query.fromBufferAttribute(geometry.attributes.position, i);
					sampleColor(model, query).toArray(colors, i * 4);
					colors[i * 4 + 3] = 1;
				}

				for (var i = 0; i < geometry.index.array.length; i += 3) {
					query.fromBufferAttribute(geometry.attributes.position, geometry.index.array[i]);
					query.add(temp.fromBufferAttribute(geometry.attributes.position, geometry.index.array[i + 1]));
					query.add(temp.fromBufferAttribute(geometry.attributes.position, geometry.index.array[i + 2]));
					query.multiplyScalar(1 / 3);

					var color = sampleColor(model, query);

					for (var j = 0; j < 3; ++j) {
						var v = geometry.index.array[i + j];
						colors[v * 4] += color.r, colors[v * 4 + 1] += color.g, colors[v * 4 + 2] += color.b, colors[v * 4 + 3]++;
					}
				}

				for (var i = 0; i < colors.length; i += 4) {
					colors[i] /= colors[i + 3], colors[i + 1] /= colors[i + 3], colors[i + 2] /= colors[i + 3], colors[i + 3] = 1;
				}

				geometry.setAttribute('color', new THREE.BufferAttribute(colors, 4));
			}

			function unwrapMesh(geometry, resolution, gutter) {
				var positions = geometry.attributes.position.array;
				var indices = new Uint32Array(geometry.index.array);

				var atlas = new Atlas();
				atlas.addMesh({ vertexPositionData: positions, vertexCount: positions.length / 3, vertexPositionStride: 12, indexData: indices, indexCount: indices.length });
				atlas.generate({}, { resolution: resolution, padding: gutter });

				var mesh = atlas.getMesh(0);
				var atlasIndices = new Uint32Array(mesh.indexCount);
				var uv = new Float32Array(mesh.indexCount * 2);
				mesh.getIndexArray(atlasIndices);
				for (var i = 0; i < mesh.indexCount; ++i) {
					var v = mesh.getVertex(atlasIndices[i]);
					uv[i * 2 + 0] = v.uv[0] / atlas.width;
					uv[i * 2 + 1] = v.uv[1] / atlas.height;
				}
				atlas.delete();

				geometry = geometry.toNonIndexed();
				geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
				return mergeVertices(geometry);
			}

			function transferTexture(model, geometry, size, gutter) {
				var data = new Float32Array(size * size * 4);
				var position = geometry.attributes.position, uv = geometry.attributes.uv, indices = geometry.index.array;
				var bary = new THREE.Vector3(), point = new THREE.Vector3();

				for (var i = 0; i < indices.length; i += 3) {
					var a = indices[i], b = indices[i + 1], c = indices[i + 2];
					var x0 = uv.getX(a) * size, y0 = uv.getY(a) * size;
					var x1 = uv.getX(b) * size, y1 = uv.getY(b) * size;
					var x2 = uv.getX(c) * size, y2 = uv.getY(c) * size;
					var minX = Math.max(0, Math.floor(Math.min(x0, x1, x2) - gutter)), maxX = Math.min(size - 1, Math.ceil(Math.max(x0, x1, x2) + gutter));
					var minY = Math.max(0, Math.floor(Math.min(y0, y1, y2) - gutter)), maxY = Math.min(size - 1, Math.ceil(Math.max(y0, y1, y2) + gutter));
					var denominator = (y1 - y2) * (x0 - x2) + (x2 - x1) * (y0 - y2);
					if (Math.abs(denominator) < 1e-7) continue;

					var scale = gutter / Math.abs(denominator);
					var epsilonX = 1e-4 + Math.hypot(x1 - x2, y1 - y2) * scale;
					var epsilonY = 1e-4 + Math.hypot(x2 - x0, y2 - y0) * scale;
					var epsilonZ = 1e-4 + Math.hypot(x0 - x1, y0 - y1) * scale;

					for (var y = minY; y <= maxY; ++y) {
						for (var x = minX; x <= maxX; ++x) {
							bary.x = ((y1 - y2) * (x + 0.5 - x2) + (x2 - x1) * (y + 0.5 - y2)) / denominator;
							bary.y = ((y2 - y0) * (x + 0.5 - x2) + (x0 - x2) * (y + 0.5 - y2)) / denominator;
							bary.z = 1 - bary.x - bary.y;
							if (bary.x < -epsilonX || bary.y < -epsilonY || bary.z < -epsilonZ) continue;

							point.set(interpolate(position, a, b, c, bary, 0), interpolate(position, a, b, c, bary, 1), interpolate(position, a, b, c, bary, 2));
							var color = sampleColor(model, point).convertLinearToSRGB();

							var offset = (y * size + x) * 4;
							data[offset] += color.r * 255;
							data[offset + 1] += color.g * 255;
							data[offset + 2] += color.b * 255;
							data[offset + 3]++;
						}
					}
				}

				for (var i = 0; i < data.length; i += 4) {
					var count = data[i + 3];
					if (count) {
						data[i] /= count;
						data[i + 1] /= count;
						data[i + 2] /= count;
						data[i + 3] = 255;
					}
				}

				var texture = new THREE.DataTexture(new Uint8Array(data), size, size, THREE.RGBAFormat);
				texture.colorSpace = THREE.SRGBColorSpace;
				texture.magFilter = THREE.LinearFilter;
				texture.minFilter = THREE.LinearFilter;
				texture.needsUpdate = true;
				return texture;
			}

			function simplifyMesh(geo, threshold, sloppy, flags) {
				var res = sloppy
					? MeshoptSimplifier.simplifySloppy(geo.index.array, geo.attributes.position.array, 3, null, 0, threshold)
					: MeshoptSimplifier.simplify(geo.index.array, geo.attributes.position.array, 3, 0, threshold, flags);

				var rgeo = geo.clone();
				rgeo.setIndex(new THREE.BufferAttribute(res[0], 1));

				return rgeo;
			}

			function remesh() {
				MeshoptSimplifier.ready.then(initializeWatlas).then(function () {
					if (!merged) return;

					var geometry = simplifyMesh(merged, 1 / settings.resolution, true);

					if (settings.simplify.enabled) {
						var flags = settings.simplify.regularize ? ['Regularize'] : [];
						geometry = simplifyMesh(geometry, Math.pow(10, -settings.simplify.errorThresholdLog10), false, flags);
					}

					geometry.computeVertexNormals();
					remeshMaterial.map = null;

					if (settings.paint.mode == 'vertex') {
						transferColors(merged, geometry);
						remeshMaterial.vertexColors = true;
						remeshMaterial.color.set(0xffffff);
					} else if (settings.paint.mode == 'texture') {
						geometry = unwrapMesh(geometry, settings.paint.resolution, settings.paint.gutter);
						remeshMaterial.vertexColors = false;
						remeshMaterial.color.set(0xffffff);
						remeshMaterial.map = transferTexture(merged, geometry, settings.paint.resolution, settings.paint.gutter);
					} else {
						remeshMaterial.vertexColors = false;
						remeshMaterial.color.set(0xdddddd);
					}
					remeshMaterial.needsUpdate = true;

					var triangles = geometry.index.count / 3;

					if (remeshed) {
						scene.remove(remeshed);
					}

					remeshed = new THREE.Mesh(geometry, remeshMaterial);
					model.visible = false;
					scene.add(remeshed);
					update();

					stats.triangles = triangles;
					stats.vertices = geometry.attributes.position.count;
					stats.ratio = (triangles / (merged.index.count / 3)) * 100;
					updateStatsDisplay();
				});
			}

			function revert() {
				if (!model) return;

				model.visible = true;
				if (remeshed) {
					scene.remove(remeshed);
					remeshed = undefined;
				}

				stats.triangles = 0;
				stats.vertices = 0;
				stats.ratio = 100;

				model.traverse(function (object) {
					if (object.isMesh) {
						stats.triangles += (object.geometry.index ? object.geometry.index.count : object.geometry.attributes.position.count) / 3;
						stats.vertices += object.geometry.attributes.position.count;
					}
				});

				updateStatsDisplay();
			}

			function updateStatsDisplay() {
				stats.label.innerHTML =
					'Triangles: ' +
					stats.triangles +
					'<br>' +
					'Vertices: ' +
					stats.vertices +
					'<br>' +
					'Ratio: ' +
					stats.ratio.toFixed(1) +
					'%';
			}

			function reload() {
				var simp = import('/js/meshopt_simplifier.js?x=' + Date.now());
				MeshoptSimplifier.ready = simp.then(function (s) {
					return s.MeshoptSimplifier.ready.then(function () {
						for (var prop in s.MeshoptSimplifier) {
							MeshoptSimplifier[prop] = s.MeshoptSimplifier[prop];
						}
					});
				});
			}

			var moduleLastModified = 0;

			function autoReload() {
				if (!settings.autoUpdate) return;

				fetch('/js/meshopt_simplifier.js?x=' + Date.now(), { method: 'HEAD' })
					.then(function (r) {
						var last = r.headers.get('Last-Modified');
						if (last != moduleLastModified) {
							moduleLastModified = last;
							reload();
							remesh();
						}

						settings.autoUpdateStatus = new Date(last).toLocaleTimeString();
						setTimeout(autoReload, 1000);
					})
					.catch(function (e) {
						settings.autoUpdateStatus = 'error';
						setTimeout(autoReload, 5000);
					});
			}

			function update() {
				scene.traverse(function (child) {
					if (child.isMesh) {
						if (Array.isArray(child.material)) {
							child.material[0].wireframe = settings.wireframe;
						} else {
							child.material.wireframe = settings.wireframe;
						}
					}
				});
			}

			function load(path, ext) {
				if (model) scene.remove(model);
				if (remeshed) scene.remove(remeshed);

				model = undefined;
				merged = undefined;
				remeshed = undefined;

				var onProgress = function (xhr) {};
				var onError = function (e) {
					console.log(e);
				};

				function center(model) {
					var bbox = new THREE.Box3().setFromObject(model);
					var scale = 2 / Math.max(bbox.max.x - bbox.min.x, bbox.max.y - bbox.min.y, bbox.max.z - bbox.min.z);
					var offset = new THREE.Vector3().addVectors(bbox.max, bbox.min).multiplyScalar(scale / 2);

					model.scale.set(scale, scale, scale);
					model.position.set(-offset.x, -offset.y, -offset.z);
				}

				function finish(object) {
					model = object;
					center(model);
					scene.add(model);
					merged = mergeMesh(model);
					revert();
				}

				if (ext == 'gltf' || ext == 'glb') {
					var loader = new GLTFLoader();
					loader.setMeshoptDecoder(MeshoptDecoder);
					loader.load(
						path,
						function (gltf) {
							finish(gltf.scene);
						},
						onProgress,
						onError
					);
				} else if (ext == 'obj') {
					var loader = new OBJLoader();
					loader.load(
						path,
						function (obj) {
							finish(obj);
						},
						onProgress,
						onError
					);
				} else {
					console.error('Unsupported file format');
				}
			}

			function loadDefault() {
				createView('pirate.glb');
				load('pirate.glb', 'glb');
			}

			function init() {
				container = document.getElementById('container');

				camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
				camera.position.y = 1.0;
				camera.position.z = 3.0;

				window.addEventListener('resize', updateRendererSizes, false);
			}

			function updateRendererSizes() {
				var rendererContainer = renderer.domElement.parentElement;
				var aspectRatio = rendererContainer.clientWidth / rendererContainer.clientHeight;

				camera.aspect = aspectRatio;
				camera.updateProjectionMatrix();

				renderer.setSize(rendererContainer.clientWidth, rendererContainer.clientHeight);
			}

			function render() {
				requestAnimationFrame(render);
				controls.update();
				renderer.render(scene, camera);
			}
		</script>
	</body>
</html>
